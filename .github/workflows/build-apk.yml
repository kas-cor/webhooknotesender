name: Build APK

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  # ──────────────────────────────────────────────
  # Parallel quality checks & debug build
  # ──────────────────────────────────────────────

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - uses: android-actions/setup-android@v4
      with:
        accept-android-sdk-licenses: true

    - uses: actions/cache@v5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - run: echo "sdk.dir=${ANDROID_HOME}" > local.properties

    - name: Lint check
      run: ./gradlew lintDebug 2>&1 | tail -30
      continue-on-error: true

    - name: Check dependencies
      run: ./gradlew dependencyCheckAnalyze 2>&1 | tail -20
      continue-on-error: true

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - uses: android-actions/setup-android@v4
      with:
        accept-android-sdk-licenses: true

    - uses: actions/cache@v5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - run: echo "sdk.dir=${ANDROID_HOME}" > local.properties

    - name: Unit tests
      run: ./gradlew testDebugUnitTest 2>&1

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-results
        path: app/build/reports/tests/
        retention-days: 7

  locales:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Validate string translations
      run: |
        echo "Проверка наличия всех строк в обоих языках..."
        EN_KEYS=$(grep -oP 'name="\K[^"]+' app/src/main/res/values/strings.xml | sort)
        RU_KEYS=$(grep -oP 'name="\K[^"]+' app/src/main/res/values-ru/strings.xml | sort)
        
        MISSING_IN_RU=$(comm -23 <(echo "$EN_KEYS") <(echo "$RU_KEYS"))
        MISSING_IN_EN=$(comm -23 <(echo "$RU_KEYS") <(echo "$EN_KEYS"))
        
        if [ -n "$MISSING_IN_RU" ]; then
          echo "Строки отсутствуют в values-ru/strings.xml:"
          echo "$MISSING_IN_RU"
          exit 1
        fi
        if [ -n "$MISSING_IN_EN" ]; then
          echo "Строки отсутствуют в values/strings.xml:"
          echo "$MISSING_IN_EN"
          exit 1
        fi
        echo "✅ Все строки присутствуют в обоих языках."

  build-debug:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - uses: android-actions/setup-android@v4
      with:
        accept-android-sdk-licenses: true

    - uses: actions/cache@v5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - run: echo "sdk.dir=${ANDROID_HOME}" > local.properties

    - name: Build Debug APK
      run: ./gradlew assembleDebug 2>&1 | tail -20

    - name: Rename Debug APK
      run: |
        VERSION=$(grep versionName app/build.gradle.kts | grep -oP '"[0-9][0-9.]*"' | tr -d '"')
        if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
          cp app/build/outputs/apk/debug/app-debug.apk "WebhookNoteSender-${VERSION}-debug.apk"
        fi

    - name: Upload Debug APK
      uses: actions/upload-artifact@v7
      with:
        name: WebhookNoteSender-debug
        path: WebhookNoteSender-*-debug.apk
        retention-days: 7

  # ──────────────────────────────────────────────
  # Release build (after parallel jobs)
  # ──────────────────────────────────────────────

  build-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test, build-debug, locales]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - uses: android-actions/setup-android@v4
      with:
        accept-android-sdk-licenses: true

    - uses: actions/cache@v5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - run: echo "sdk.dir=${ANDROID_HOME}" > local.properties

    - name: Bump version (tag push only)
      if: startsWith(github.ref, 'refs/tags/v')
      id: bump
      run: |
        TAG_VERSION="${GITHUB_REF_NAME#v}"
        echo "Bumping to version: $TAG_VERSION"
        sed -i "s/versionName = \".*\"/versionName = \"$TAG_VERSION\"/" app/build.gradle.kts
        CURRENT_CODE=$(grep 'versionCode =' app/build.gradle.kts | grep -oP '\d+')
        NEW_CODE=$((CURRENT_CODE + 1))
        sed -i "s/versionCode = $CURRENT_CODE/versionCode = $NEW_CODE/" app/build.gradle.kts
        echo "VERSION_NAME=$TAG_VERSION" >> $GITHUB_ENV
        echo "VERSION_CODE=$NEW_CODE" >> $GITHUB_ENV

    - name: Commit version bump
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'
        git add app/build.gradle.kts
        git commit -m "chore: bump version to ${VERSION_NAME} (${VERSION_CODE})"
        git pull --rebase origin main
        git push origin HEAD:main

    - name: Decode keystore
      if: startsWith(github.ref, 'refs/tags/v')
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 -d > webhooknotesender-release.jks 2>/dev/null || true

    - name: Build and Sign Release APK
      env:
        KEYSTORE_PATH: ${{ github.workspace }}/webhooknotesender-release.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease 2>&1 | tail -20

    - name: Rename APKs
      run: |
        VERSION="${VERSION_NAME:-$(grep versionName app/build.gradle.kts | grep -oP '"[0-9][0-9.]*"' | tr -d '"')}"
        if [ -f app/build/outputs/apk/release/app-release.apk ]; then
          cp app/build/outputs/apk/release/app-release.apk "WebhookNoteSender-${VERSION}.apk"
        fi
        if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
          cp app/build/outputs/apk/release/app-release-unsigned.apk "WebhookNoteSender-${VERSION}-unsigned.apk"
        fi

    - name: Upload Release APK
      if: startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v7
      with:
        name: WebhookNoteSender-release
        path: WebhookNoteSender-*.apk
        retention-days: 30

  # ──────────────────────────────────────────────
  # GitHub Release (tag push only)
  # ──────────────────────────────────────────────

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Get version
      run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

    - name: Download Release APK
      uses: actions/download-artifact@v8
      with:
        name: WebhookNoteSender-release
        path: release-artifacts

    - name: Generate changelog
      run: |
        echo "# WebhookNoteSender v${{ env.VERSION }}" > release-changelog.md
        echo "" >> release-changelog.md
        git log --oneline $(git tag --sort=-version:refname | head -2 | tail -1 || git rev-list --max-parents=0 HEAD)..HEAD --no-merges >> release-changelog.md 2>/dev/null || echo "- Initial release" >> release-changelog.md

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        name: v${{ env.VERSION }}
        body_path: release-changelog.md
        files: |
          release-artifacts/WebhookNoteSender-*.apk
        fail_on_unmatched_files: false
